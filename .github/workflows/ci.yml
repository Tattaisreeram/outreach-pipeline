name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        env:
          # tests are fully mocked — no real keys needed
          OCEAN_API_TOKEN: dummy
          HUNTER_API_KEY: dummy
          BREVO_API_KEY: dummy
          BREVO_SENDER_EMAIL: test@example.com
          BREVO_SENDER_NAME: Test
          DEMO_RECIPIENT: test@example.com
        run: pytest tests/ -v
